name: Cleanup Stale Files

# 1회만 수동 실행 후 이 파일 자체도 삭제하세요
on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Remove stale files
        run: |
          # ── 루트 레벨 구버전 파일 ──────────────────────────────
          rm -f aria_scanner.py          # Jackal로 대체됨
          rm -f aria_scanner.yml         # aria_jackal.yml로 대체됨

          # ── 워크플로우 구버전 ──────────────────────────────────
          rm -f .github/workflows/telegram.yml        # 테스트용
          rm -f .github/workflows/aria_scanner.yml    # 구버전

          echo "✅ 정리 완료"
          echo "남은 워크플로우:"
          ls .github/workflows/

      - name: Commit cleanup
        run: |
          git config user.name  "ARIA Bot"
          git config user.email "aria@github-actions"
          git add -A
          git diff --staged --quiet || \
            git commit -m "🧹 Cleanup: 구버전 파일 정리"
          git push

      - name: "⚠️ 이 파일도 직접 삭제하세요"
        run: |
          echo "========================================"
          echo "실행 완료!"
          echo "마지막으로 GitHub에서 직접 삭제:"
          echo ".github/workflows/cleanup.yml"
          echo "========================================"
