name: Wave F Clustering

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no DB write)"
        type: choice
        options:
          - "true"
          - "false"
        default: "true"
      n_clusters:
        description: "Number of clusters"
        type: string
        default: "8"
      force_rebuild:
        description: "Clear existing clustering data before running"
        type: choice
        options:
          - "false"
          - "true"
        default: "false"
      append_mode:
        description: "Append a new clustering run and preserve existing runs"
        type: choice
        options:
          - "false"
          - "true"
        default: "false"
      source_event_type:
        description: "Snapshot source to cluster"
        type: choice
        options:
          - backtest_backfill
          - backtest
          - all
        default: "backtest_backfill"
      expected_snapshots:
        description: "Expected snapshot assignments"
        type: string
        default: "757"
      expected_linked_lessons:
        description: "Expected lessons reachable through cluster mappings"
        type: string
        default: "3869"
      min_silhouette:
        description: "Minimum acceptable silhouette"
        type: string
        default: "0.11"

concurrency:
  group: orca-repo-state
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  clustering:
    runs-on: ubuntu-latest
    env:
      USE_FDR_MAIN: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve inputs
        shell: bash
        run: |
          trim_workflow_input() {
            local value="$1"
            value="${value#"${value%%[![:space:]]*}"}"
            value="${value%"${value##*[![:space:]]}"}"
            printf '%s' "$value"
          }

          normalize_bool() {
            local value
            value="$(trim_workflow_input "$1")"
            value="${value,,}"
            if [ "$value" = "true" ] || [ "$value" = "1" ] || [ "$value" = "yes" ]; then
              printf 'true'
            else
              printf 'false'
            fi
          }

          CLUSTER_DRY_RUN="$(normalize_bool "${{ inputs.dry_run }}")"
          CLUSTER_N_CLUSTERS="$(trim_workflow_input "${{ inputs.n_clusters }}")"
          CLUSTER_FORCE_REBUILD="$(normalize_bool "${{ inputs.force_rebuild }}")"
          CLUSTER_APPEND_MODE="$(normalize_bool "${{ inputs.append_mode }}")"
          CLUSTER_SOURCE_EVENT_TYPE="$(trim_workflow_input "${{ inputs.source_event_type }}")"
          EXPECTED_SNAPSHOTS_VALUE="$(trim_workflow_input "${{ inputs.expected_snapshots }}")"
          EXPECTED_LINKED_LESSONS_VALUE="$(trim_workflow_input "${{ inputs.expected_linked_lessons }}")"
          MIN_SILHOUETTE_VALUE="$(trim_workflow_input "${{ inputs.min_silhouette }}")"

          if [ -z "$CLUSTER_N_CLUSTERS" ]; then
            CLUSTER_N_CLUSTERS="8"
          fi
          if [ -z "$CLUSTER_SOURCE_EVENT_TYPE" ]; then
            CLUSTER_SOURCE_EVENT_TYPE="backtest_backfill"
          fi
          if [ -z "$EXPECTED_SNAPSHOTS_VALUE" ]; then
            EXPECTED_SNAPSHOTS_VALUE="757"
          fi
          if [ -z "$EXPECTED_LINKED_LESSONS_VALUE" ]; then
            EXPECTED_LINKED_LESSONS_VALUE="3869"
          fi
          if [ -z "$MIN_SILHOUETTE_VALUE" ]; then
            MIN_SILHOUETTE_VALUE="0.11"
          fi

          echo "CLUSTER_DRY_RUN=$CLUSTER_DRY_RUN" >> "$GITHUB_ENV"
          echo "CLUSTER_N_CLUSTERS=$CLUSTER_N_CLUSTERS" >> "$GITHUB_ENV"
          echo "CLUSTER_FORCE_REBUILD=$CLUSTER_FORCE_REBUILD" >> "$GITHUB_ENV"
          echo "CLUSTER_APPEND_MODE=$CLUSTER_APPEND_MODE" >> "$GITHUB_ENV"
          echo "CLUSTER_SOURCE_EVENT_TYPE=$CLUSTER_SOURCE_EVENT_TYPE" >> "$GITHUB_ENV"
          echo "EXPECTED_SNAPSHOTS=$EXPECTED_SNAPSHOTS_VALUE" >> "$GITHUB_ENV"
          echo "EXPECTED_LINKED_LESSONS=$EXPECTED_LINKED_LESSONS_VALUE" >> "$GITHUB_ENV"
          echo "MIN_SILHOUETTE=$MIN_SILHOUETTE_VALUE" >> "$GITHUB_ENV"

          echo "Resolved inputs:"
          echo "  dry_run=$CLUSTER_DRY_RUN"
          echo "  n_clusters=$CLUSTER_N_CLUSTERS"
          echo "  force_rebuild=$CLUSTER_FORCE_REBUILD"
          echo "  append_mode=$CLUSTER_APPEND_MODE"
          echo "  source_event_type=$CLUSTER_SOURCE_EVENT_TYPE"
          echo "  expected_snapshots=$EXPECTED_SNAPSHOTS_VALUE"
          echo "  expected_linked_lessons=$EXPECTED_LINKED_LESSONS_VALUE"
          echo "  min_silhouette=$MIN_SILHOUETTE_VALUE"

      - name: Pre-flight status
        run: |
          python - <<'PY'
          import os
          import sqlite3
          from orca import state

          state.init_state_db()
          conn = sqlite3.connect('data/orca_state.db')
          source = os.environ.get('CLUSTER_SOURCE_EVENT_TYPE', 'backtest_backfill').strip()
          source_filter = "" if source.lower() in {"", "all", "*", "none"} else " AND source_event_type = ?"
          source_params = () if not source_filter else (source,)
          snapshots = conn.execute('SELECT COUNT(*) FROM lesson_context_snapshot').fetchone()[0]
          usable = conn.execute(f"""
              SELECT COUNT(*)
              FROM lesson_context_snapshot
              WHERE vix_level IS NOT NULL
                AND sp500_momentum_5d IS NOT NULL
                AND sp500_momentum_20d IS NOT NULL
                AND nasdaq_momentum_5d IS NOT NULL
                AND nasdaq_momentum_20d IS NOT NULL
                {source_filter}
          """, source_params).fetchone()[0]
          linked_lessons = conn.execute("""
              SELECT COUNT(*)
              FROM candidate_lessons
              WHERE context_snapshot_id IS NOT NULL
          """).fetchone()[0]
          clusters = conn.execute('SELECT COUNT(*) FROM lesson_clusters').fetchone()[0]
          mappings = conn.execute('SELECT COUNT(*) FROM snapshot_cluster_mapping').fetchone()[0]
          latest_run = state.get_latest_run_id(conn)
          print('Pre-flight:')
          print(f'  snapshots: {snapshots}')
          print(f'  clustering source: {source or "all"}')
          print(f'  usable source snapshots: {usable}')
          print(f'  lessons with context: {linked_lessons}')
          print(f'  existing clusters: {clusters}')
          print(f'  existing mappings: {mappings}')
          print(f'  latest run_id: {latest_run or "(none)"}')
          conn.close()
          PY

      - name: Run clustering
        run: |
          ARGS=(
            --n-clusters "$CLUSTER_N_CLUSTERS"
            --source-event-type "$CLUSTER_SOURCE_EVENT_TYPE"
            --expected-snapshots "$EXPECTED_SNAPSHOTS"
            --expected-linked-lessons "$EXPECTED_LINKED_LESSONS"
            --min-silhouette "$MIN_SILHOUETTE"
          )
          if [ "$CLUSTER_DRY_RUN" = "true" ]; then
            ARGS+=(--dry-run)
          else
            ARGS+=(--execute)
          fi
          if [ "$CLUSTER_FORCE_REBUILD" = "true" ]; then
            ARGS+=(--force-rebuild)
          fi
          if [ "$CLUSTER_APPEND_MODE" = "true" ]; then
            ARGS+=(--append)
          fi
          python scripts/build_lesson_clusters.py --verbose "${ARGS[@]}"

      - name: Strict verify
        if: env.CLUSTER_DRY_RUN != 'true'
        run: |
          python - <<'PY'
          import os
          import sqlite3
          from orca import state

          expected_clusters = int(os.environ['CLUSTER_N_CLUSTERS'])
          expected_snapshots = int(os.environ.get('EXPECTED_SNAPSHOTS', '757'))
          expected_linked_lessons = int(os.environ.get('EXPECTED_LINKED_LESSONS', '3869'))
          source = os.environ.get('CLUSTER_SOURCE_EVENT_TYPE', 'backtest_backfill').strip()
          source_filter = "" if source.lower() in {"", "all", "*", "none"} else " AND s.source_event_type = ?"
          source_params = () if not source_filter else (source,)
          conn = sqlite3.connect('data/orca_state.db')
          latest_run = state.get_latest_run_id(conn)
          failures = []
          if not latest_run:
              failures.append('No latest clustering run_id found')
          clusters = conn.execute(
              'SELECT COUNT(*) FROM lesson_clusters WHERE run_id = ?',
              (latest_run,),
          ).fetchone()[0] if latest_run else 0
          mappings = conn.execute(
              'SELECT COUNT(*) FROM snapshot_cluster_mapping WHERE run_id = ?',
              (latest_run,),
          ).fetchone()[0] if latest_run else 0
          cached = conn.execute("""
              SELECT COUNT(*)
              FROM lesson_context_snapshot s
              WHERE s.context_cluster_id IS NOT NULL
          """ + source_filter, source_params).fetchone()[0]
          if latest_run and source == "backtest_backfill":
              clustered_lessons = conn.execute("""
                  SELECT COUNT(*)
                  FROM candidate_lessons l
                  JOIN candidate_registry c
                    ON c.candidate_id = l.candidate_id
                  JOIN (
                        SELECT trading_date, MIN(snapshot_id) AS snapshot_id
                        FROM lesson_context_snapshot
                        WHERE source_event_type = 'backtest_backfill'
                        GROUP BY trading_date
                  ) canonical
                    ON canonical.trading_date = substr(c.analysis_date, 1, 10)
                  JOIN snapshot_cluster_mapping m
                    ON m.snapshot_id = canonical.snapshot_id
                  WHERE c.source_event_type = 'backtest'
                    AND m.run_id = ?
              """, (latest_run,)).fetchone()[0]
          else:
              clustered_lessons = conn.execute("""
                  SELECT COUNT(*)
                  FROM candidate_lessons l
                  JOIN snapshot_cluster_mapping m
                    ON m.snapshot_id = l.context_snapshot_id
                  WHERE m.run_id = ?
              """, (latest_run,)).fetchone()[0] if latest_run else 0
          min_silhouette = conn.execute(
              'SELECT MIN(silhouette_score) FROM lesson_clusters WHERE run_id = ?',
              (latest_run,),
          ).fetchone()[0] if latest_run else None
          avg_silhouette = conn.execute(
              'SELECT AVG(silhouette_score) FROM lesson_clusters WHERE run_id = ?',
              (latest_run,),
          ).fetchone()[0] if latest_run else None

          if clusters != expected_clusters:
              failures.append(f'clusters {clusters} != expected {expected_clusters}')
          if mappings < expected_snapshots:
              failures.append(f'mappings {mappings} < {expected_snapshots}')
          if cached < expected_snapshots:
              failures.append(f'context_cluster_id cached {cached} < {expected_snapshots}')
          if clustered_lessons < expected_linked_lessons:
              failures.append(f'clustered lessons {clustered_lessons} < {expected_linked_lessons}')

          print('Strict verify:')
          print(f'  latest_run: {latest_run}')
          print(f'  source_event_type: {source or "all"}')
          print(f'  clusters: {clusters}')
          print(f'  mappings: {mappings}')
          print(f'  cached snapshots: {cached}')
          print(f'  clustered lessons: {clustered_lessons}')
          print(f'  min cluster silhouette: {min_silhouette}')
          print(f'  avg cluster silhouette: {avg_silhouette}')

          conn.close()
          if failures:
              print()
              print('FAILURES:')
              for failure in failures:
                  print(f'  - {failure}')
              raise SystemExit(1)
          print()
          print('PASS clustering verification complete')
          PY

      - name: Checkpoint DB
        if: env.CLUSTER_DRY_RUN != 'true'
        run: |
          python - <<'PY'
          import os
          import sqlite3

          conn = sqlite3.connect('data/orca_state.db')
          conn.execute('PRAGMA wal_checkpoint(TRUNCATE);')
          conn.close()

          for suffix in ('-wal', '-shm'):
              path = f'data/orca_state.db{suffix}'
              if os.path.exists(path):
                  os.remove(path)
                  print(f'Removed: {path}')
          print('Checkpoint complete')
          PY

      - name: Commit and push
        if: env.CLUSTER_DRY_RUN != 'true'
        run: |
          git config user.name "Wave F Clustering"
          git config user.email "wave-f-clustering@orca-agent"
          echo "Git status before staging:"
          git status --short
          git add -f data/orca_state.db
          echo "Staged state diff:"
          git diff --cached --stat
          git diff --cached --name-status
          git diff --cached --quiet && {
            echo "no state changes to commit"
            echo "Git status after push:"
            git status --short
            exit 0
          }
          git commit -m "chore: Wave F Phase 2 - Build lesson clusters [skip ci]"
          echo "Commit created: $(git rev-parse --short HEAD)"
          echo "Rebasing committed state on origin/main before push"
          git pull --rebase origin main || {
            git rebase --abort || true
            exit 1
          }
          if git push; then
            echo "Push succeeded"
          else
            echo "Initial push failed; rebasing once and retrying" >&2
            git pull --rebase origin main || {
              git rebase --abort || true
              exit 1
            }
            git push
            echo "Push succeeded after rebase retry"
          fi
          echo "Git status after push:"
          git status --short
