name: Wave F Archive

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no DB write)"
        type: choice
        options:
          - "true"
          - "false"
        default: "true"
      cluster_run_id:
        description: "Cluster run_id (empty = latest)"
        type: string
        default: ""
      force_rebuild:
        description: "Clear existing archive data before running"
        type: choice
        options:
          - "false"
          - "true"
        default: "false"
      append_mode:
        description: "Append a new archive run and preserve existing archive rows"
        type: choice
        options:
          - "false"
          - "true"
        default: "false"
      expected_archive_count:
        description: "Expected archive rows for latest run"
        type: string
        default: "3864"

concurrency:
  group: orca-repo-state
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  archive:
    runs-on: ubuntu-latest
    env:
      PYTHONIOENCODING: utf-8
      USE_FDR_MAIN: "1"
      USE_UNIFIED_FETCH: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve inputs
        shell: bash
        run: |
          trim_workflow_input() {
            local value="$1"
            value="${value#"${value%%[![:space:]]*}"}"
            value="${value%"${value##*[![:space:]]}"}"
            printf '%s' "$value"
          }

          normalize_bool() {
            local value
            value="$(trim_workflow_input "$1")"
            value="${value,,}"
            if [ "$value" = "true" ] || [ "$value" = "1" ] || [ "$value" = "yes" ]; then
              printf 'true'
            else
              printf 'false'
            fi
          }

          ARCHIVE_DRY_RUN_VALUE="$(normalize_bool "${{ inputs.dry_run }}")"
          ARCHIVE_FORCE_REBUILD_VALUE="$(normalize_bool "${{ inputs.force_rebuild }}")"
          ARCHIVE_APPEND_MODE_VALUE="$(normalize_bool "${{ inputs.append_mode }}")"
          ARCHIVE_CLUSTER_RUN_ID_VALUE="$(trim_workflow_input "${{ inputs.cluster_run_id }}")"
          EXPECTED_ARCHIVE_COUNT_VALUE="$(trim_workflow_input "${{ inputs.expected_archive_count }}")"

          [ -z "$EXPECTED_ARCHIVE_COUNT_VALUE" ] && EXPECTED_ARCHIVE_COUNT_VALUE="3864"

          echo "ARCHIVE_DRY_RUN=$ARCHIVE_DRY_RUN_VALUE" >> "$GITHUB_ENV"
          echo "ARCHIVE_FORCE_REBUILD=$ARCHIVE_FORCE_REBUILD_VALUE" >> "$GITHUB_ENV"
          echo "ARCHIVE_APPEND_MODE=$ARCHIVE_APPEND_MODE_VALUE" >> "$GITHUB_ENV"
          echo "ARCHIVE_CLUSTER_RUN_ID=$ARCHIVE_CLUSTER_RUN_ID_VALUE" >> "$GITHUB_ENV"
          echo "EXPECTED_ARCHIVE_COUNT=$EXPECTED_ARCHIVE_COUNT_VALUE" >> "$GITHUB_ENV"

          echo "Resolved inputs:"
          echo "  dry_run=$ARCHIVE_DRY_RUN_VALUE"
          echo "  cluster_run_id=${ARCHIVE_CLUSTER_RUN_ID_VALUE:-latest}"
          echo "  force_rebuild=$ARCHIVE_FORCE_REBUILD_VALUE"
          echo "  append_mode=$ARCHIVE_APPEND_MODE_VALUE"
          echo "  expected_archive_count=$EXPECTED_ARCHIVE_COUNT_VALUE"

      - name: Pre-flight status
        shell: bash
        run: |
          python - <<'PY'
          import os
          import sqlite3
          from pathlib import Path
          from orca import state

          state.init_state_db()
          conn = sqlite3.connect('data/orca_state.db')
          clusters = conn.execute('SELECT COUNT(*) FROM lesson_clusters').fetchone()[0]
          mappings = conn.execute('SELECT COUNT(*) FROM snapshot_cluster_mapping').fetchone()[0]
          linked_lessons = conn.execute("""
              SELECT COUNT(*)
              FROM candidate_lessons
              WHERE context_snapshot_id IS NOT NULL
          """).fetchone()[0]
          canonical_clustered_lessons = conn.execute("""
              SELECT COUNT(*)
              FROM candidate_lessons l
              JOIN candidate_registry c
                ON c.candidate_id = l.candidate_id
              JOIN (
                    SELECT trading_date, MIN(snapshot_id) AS snapshot_id
                    FROM lesson_context_snapshot
                    WHERE source_event_type = 'backtest_backfill'
                    GROUP BY trading_date
              ) canonical
                ON canonical.trading_date = substr(c.analysis_date, 1, 10)
              JOIN snapshot_cluster_mapping m
                ON m.snapshot_id = canonical.snapshot_id
              WHERE c.source_event_type = 'backtest'
          """).fetchone()[0]
          archives = conn.execute('SELECT COUNT(*) FROM lesson_archive').fetchone()[0]
          latest_cluster_run = state.get_latest_run_id(conn)
          latest_archive_run = state.get_latest_archive_run_id(conn)
          cold = Path('data/archive/lesson_archive_cold.db')
          print('Pre-flight:')
          print(f'  main_db_mb: {os.path.getsize("data/orca_state.db") / 1024 / 1024:.2f}')
          print(f'  cold_archive_exists: {cold.exists()}')
          print(f'  clusters: {clusters}')
          print(f'  mappings: {mappings}')
          print(f'  lessons with context: {linked_lessons}')
          print(f'  canonical clustered lessons: {canonical_clustered_lessons}')
          print(f'  existing archive rows: {archives}')
          print(f'  latest cluster run_id: {latest_cluster_run or "(none)"}')
          print(f'  latest archive run_id: {latest_archive_run or "(none)"}')
          conn.close()
          PY

      - name: Run archive build
        shell: bash
        run: |
          ARGS=(--expected-lessons "$EXPECTED_ARCHIVE_COUNT")
          if [ "$ARCHIVE_DRY_RUN" = "true" ]; then
            ARGS+=(--dry-run)
          else
            ARGS+=(--execute)
          fi
          if [ -n "$ARCHIVE_CLUSTER_RUN_ID" ]; then
            ARGS+=(--cluster-run-id "$ARCHIVE_CLUSTER_RUN_ID")
          fi
          if [ "$ARCHIVE_FORCE_REBUILD" = "true" ]; then
            ARGS+=(--force-rebuild)
          fi
          if [ "$ARCHIVE_APPEND_MODE" = "true" ]; then
            ARGS+=(--append)
          fi
          python scripts/build_lesson_archive.py --verbose "${ARGS[@]}"

      - name: Strict verify
        shell: bash
        run: |
          if [ "$ARCHIVE_DRY_RUN" = "true" ]; then
            echo "Strict verify skipped for dry_run=true"
            exit 0
          fi

          python - <<'PY'
          import os
          import sqlite3
          from orca import state

          expected_archive_count = int(os.environ.get('EXPECTED_ARCHIVE_COUNT', '3864'))
          conn = sqlite3.connect('data/orca_state.db')
          latest_run = state.get_latest_archive_run_id(conn)
          failures = []
          if not latest_run:
              failures.append('No latest archive run_id found')
          archive_rows = conn.execute(
              'SELECT COUNT(*) FROM lesson_archive WHERE run_id = ?',
              (latest_run,),
          ).fetchone()[0] if latest_run else 0
          tier_total = conn.execute(
              """
              SELECT COUNT(*)
              FROM lesson_archive
              WHERE run_id = ?
                AND quality_tier IN ('high', 'medium', 'low')
              """,
              (latest_run,),
          ).fetchone()[0] if latest_run else 0
          avg_quality = conn.execute(
              'SELECT AVG(quality_score) FROM lesson_archive WHERE run_id = ?',
              (latest_run,),
          ).fetchone()[0] if latest_run else None
          distinct_lessons = conn.execute(
              'SELECT COUNT(DISTINCT lesson_id) FROM lesson_archive WHERE run_id = ?',
              (latest_run,),
          ).fetchone()[0] if latest_run else 0

          if archive_rows != expected_archive_count:
              failures.append(f'archive rows {archive_rows} != {expected_archive_count}')
          if distinct_lessons != expected_archive_count:
              failures.append(f'distinct archived lessons {distinct_lessons} != {expected_archive_count}')
          if tier_total != archive_rows:
              failures.append(f'tier rows {tier_total} != archive rows {archive_rows}')
          if avg_quality is None or avg_quality <= 0:
              failures.append(f'avg quality invalid: {avg_quality}')

          print('Strict verify:')
          print(f'  latest_archive_run: {latest_run}')
          print(f'  archive_rows: {archive_rows}')
          print(f'  distinct_lessons: {distinct_lessons}')
          print(f'  tier_total: {tier_total}')
          print(f'  avg_quality: {avg_quality}')

          conn.close()
          if failures:
              print()
              print('FAILURES:')
              for failure in failures:
                  print(f'  - {failure}')
              raise SystemExit(1)
          print()
          print('PASS archive verification complete')
          PY

      - name: Checkpoint DB
        shell: bash
        run: |
          if [ "$ARCHIVE_DRY_RUN" = "true" ]; then
            echo "Checkpoint skipped for dry_run=true"
            exit 0
          fi

          python - <<'PY'
          import os
          import sqlite3

          conn = sqlite3.connect('data/orca_state.db')
          conn.execute('PRAGMA wal_checkpoint(TRUNCATE);')
          conn.close()

          for suffix in ('-wal', '-shm'):
              path = f'data/orca_state.db{suffix}'
              if os.path.exists(path):
                  os.remove(path)
                  print(f'Removed: {path}')
          print('Checkpoint complete')
          PY

      - name: Commit and push
        shell: bash
        run: |
          if [ "$ARCHIVE_DRY_RUN" = "true" ]; then
            echo "Commit skipped for dry_run=true"
            exit 0
          fi

          git config user.name "Wave F Archive"
          git config user.email "wave-f-archive@orca-agent"
          echo "Git status before staging:"
          git status --short
          git add -f data/orca_state.db
          git add -f data/archive/lesson_archive_cold.db 2>/dev/null || true
          echo "Staged state diff:"
          git diff --cached --stat
          git diff --cached --name-status
          git diff --cached --quiet && {
            echo "no state changes to commit"
            echo "Git status after push:"
            git status --short
            exit 0
          }
          git commit -m "chore: Wave F Phase 3 - Build lesson archive [skip ci]"
          echo "Commit created: $(git rev-parse --short HEAD)"
          echo "Rebasing committed state on origin/main before push"
          git pull --rebase origin main || {
            git rebase --abort || true
            exit 1
          }
          if git push; then
            echo "Push succeeded"
          else
            echo "Initial push failed; rebasing once and retrying" >&2
            git pull --rebase origin main || {
              git rebase --abort || true
              exit 1
            }
            git push
            echo "Push succeeded after rebase retry"
          fi
          echo "Git status after push:"
          git status --short
