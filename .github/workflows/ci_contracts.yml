name: ORCA Contract CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contracts:
    runs-on: ubuntu-latest
    env:
      PYTHONIOENCODING: utf-8

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run contract tests
        run: |
          python -m unittest \
            tests.shared.test_contracts_pydantic \
            tests.shared.test_contracts_envelope \
            tests.shared.test_contracts_alpha \
            tests.shared.test_contracts_outcome \
            tests.shared.test_contracts_memory \
            tests.shared.test_contracts_memory_injection \
            -v

      - name: Requirements drift report
        run: |
          python scripts/check_requirements_drift.py \
            --output-json "${RUNNER_TEMP}/requirements_drift.json" \
            --output-md "${RUNNER_TEMP}/requirements_drift.md"

      - name: Upload contract artifacts
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: contracts-ci
          path: |
            ${{ runner.temp }}/requirements_drift.json
            ${{ runner.temp }}/requirements_drift.md
          if-no-files-found: ignore
