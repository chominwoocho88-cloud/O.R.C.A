name: Apply Remaining Bug Fixes

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fix Bug1-B (jackal_evolution.py - wrong model name)
        run: |
          python -c "
          from pathlib import Path
          f = Path('jackal/jackal_evolution.py')
          src = f.read_text(encoding='utf-8')
          old = 'MODEL_S = os.environ.get(\"ANTHROPIC_MODEL\", \"claude-sonnet-4-20250514\")'
          new = 'MODEL_S = os.environ.get(\"ANTHROPIC_MODEL\", os.environ.get(\"SUBAGENT_MODEL\", \"claude-sonnet-4-6\"))'
          if old in src:
              f.write_text(src.replace(old, new), encoding='utf-8')
              print('Bug1-B fixed')
          else:
              print('Bug1-B: pattern not found, showing MODEL_S line:')
              for i,l in enumerate(src.splitlines()):
                  if 'MODEL_S' in l and 'os.environ' in l:
                      print(f'  line {i+1}: {repr(l)}')
          "

      - name: Fix Bug4 (aria_adapter.py - path logic)
        run: |
          python -c "
          from pathlib import Path
          f = Path('jackal/aria_adapter.py')
          src = f.read_text(encoding='utf-8')

          # 현재 상태 출력
          for i, l in enumerate(src.splitlines()):
              if '_BASE' in l or '_ROOT' in l or 'DATA_DIR' in l:
                  if 'Path(__file__)' in l or 'parent' in l or 'data' in l.lower():
                      print(f'  line {i+1}: {repr(l)}')

          # 패턴 매칭 시도 (여러 변형)
          patterns = [
              ('_BASE         = Path(__file__).parent\n_ROOT         = _BASE.parent if (_BASE / \"jackal_hunter.py\").exists() else _BASE\nDATA_DIR      = _ROOT / \"data\"',
               '_JACKAL_DIR = Path(__file__).parent\n_REPO_ROOT  = _JACKAL_DIR.parent\nDATA_DIR    = _REPO_ROOT / \"data\"'),
              ('_BASE         = Path(__file__).parent\n_ROOT         = _BASE.parent if (_BASE / \"jackal_hunter.py\").exists() else _BASE\nDATA_DIR      = _ROOT / \"data\"\n',
               '_JACKAL_DIR = Path(__file__).parent\n_REPO_ROOT  = _JACKAL_DIR.parent\nDATA_DIR    = _REPO_ROOT / \"data\"\n'),
          ]
          fixed = False
          for old, new in patterns:
              if old in src:
                  f.write_text(src.replace(old, new), encoding='utf-8')
                  print('Bug4 fixed')
                  fixed = True
                  break
          if not fixed:
              # 줄별로 직접 교체
              lines = src.splitlines(keepends=True)
              new_lines = []
              i = 0
              changed = False
              while i < len(lines):
                  l = lines[i]
                  if ('_BASE' in l and 'Path(__file__).parent' in l and
                      i+1 < len(lines) and '_ROOT' in lines[i+1] and 'jackal_hunter' in lines[i+1] and
                      i+2 < len(lines) and 'DATA_DIR' in lines[i+2] and '_ROOT' in lines[i+2]):
                      new_lines.append('_JACKAL_DIR = Path(__file__).parent\n')
                      new_lines.append('_REPO_ROOT  = _JACKAL_DIR.parent\n')
                      new_lines.append('DATA_DIR    = _REPO_ROOT / \"data\"\n')
                      i += 3
                      changed = True
                      print('Bug4 fixed (line-by-line)')
                  else:
                      new_lines.append(l)
                      i += 1
              if changed:
                  f.write_text(''.join(new_lines), encoding='utf-8')
              else:
                  print('Bug4: could not fix - manual fix needed')
          "

      - name: Fix Bug9 (aria_paths.py - relative path)
        run: |
          python -c "
          from pathlib import Path
          f = Path('aria_paths.py')
          src = f.read_text(encoding='utf-8')

          # 현재 상태 출력
          for i, l in enumerate(src.splitlines()):
              if 'DATA_DIR' in l or 'REPORTS_DIR' in l or 'mkdir' in l:
                  print(f'  line {i+1}: {repr(l)}')

          # 줄별로 직접 교체
          lines = src.splitlines(keepends=True)
          new_lines = []
          i = 0
          changed = False
          while i < len(lines):
              l = lines[i]
              # DATA_DIR = Path(...) 줄 찾기
              if 'DATA_DIR' in l and 'Path(' in l and 'data' in l and '__file__' not in l:
                  # 다음 몇 줄을 확인
                  block = [l]
                  j = i + 1
                  while j < len(lines) and j < i + 6:
                      block.append(lines[j])
                      j += 1
                  block_str = ''.join(block)

                  if 'mkdir' in block_str and 'REPORTS_DIR' in block_str:
                      new_lines.append('_REPO_ROOT  = Path(__file__).parent\n')
                      new_lines.append('DATA_DIR    = _REPO_ROOT / \"data\"\n')
                      # REPORTS_DIR 줄 찾아서 추가
                      i += 1
                      while i < len(lines):
                          cur = lines[i]
                          if 'REPORTS_DIR' in cur and 'Path(' in cur and '__file__' not in cur:
                              new_lines.append('REPORTS_DIR = _REPO_ROOT / \"reports\"\n')
                              i += 1
                              break
                          elif 'mkdir' in cur:
                              i += 1
                              continue
                          else:
                              new_lines.append(cur)
                              i += 1
                              break
                      # mkdir 줄들 제거하고 ensure_dirs 추가
                      while i < len(lines) and 'mkdir' in lines[i]:
                          i += 1
                      new_lines.append('\n')
                      new_lines.append('\n')
                      new_lines.append('def ensure_dirs() -> None:\n')
                      new_lines.append('    \"\"\"data/, reports/ 보장\"\"\"\n')
                      new_lines.append('    DATA_DIR.mkdir(exist_ok=True)\n')
                      new_lines.append('    REPORTS_DIR.mkdir(exist_ok=True)\n')
                      new_lines.append('\n')
                      new_lines.append('\n')
                      new_lines.append('ensure_dirs()\n')
                      changed = True
                      print('Bug9 fixed')
                  else:
                      new_lines.append(l)
                      i += 1
              else:
                  new_lines.append(l)
                  i += 1
          if changed:
              f.write_text(''.join(new_lines), encoding='utf-8')
          else:
              print('Bug9: pattern not matched, showing file:')
              for i, l in enumerate(src.splitlines()[:20]):
                  print(f'  {i+1}: {repr(l)}')
          "

      - name: Verify
        run: python verify_bugs_inline.py

      - name: Commit
        if: success()
        run: |
          git config user.name  "ARIA Bot"
          git config user.email "aria@github-actions"
          git add jackal/jackal_evolution.py jackal/aria_adapter.py aria_paths.py
          git diff --cached --quiet || git commit -m "Fix: Bug1-B Bug4 Bug9 수정 [skip ci]"
          git push
