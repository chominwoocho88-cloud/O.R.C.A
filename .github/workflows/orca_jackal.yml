name: JACKAL Session

# Session-oriented JACKAL workflow
# - Full session: Hunter -> Scanner -> Save state
# - Keeps discovery and timing logic separate in code, but runs them as one user-visible session.
# - Manual Scanner workflow remains available for debugging / ad-hoc rescans only.

concurrency:
  group: orca-repo-state
  cancel-in-progress: false
on:
  schedule:
    # Korean session
    - cron: "35 0 * * 1-5"    # KST 09:35  full session (Hunter -> Scanner)
    - cron: "30 4 * * 1-5"    # KST 13:30  scanner refresh
    # US session
    - cron: "35 14 * * 1-5"   # KST 23:35  full session (Hunter -> Scanner)
    - cron: "30 18 * * 1-5"   # KST 03:30  scanner refresh (next KST day)

  workflow_dispatch:
    inputs:
      session_mode:
        description: "full / scanner_only"
        required: false
        default: "full"
      force_hunt:
        description: "?쒖옣 ?곹깭? 臾닿??섍쾶 Hunter 媛뺤젣 ?ㅽ뻾"
        required: false
        default: "false"
      force_scan:
        description: "?쒖옣 ?곹깭? 臾닿??섍쾶 Scanner 媛뺤젣 ?ㅽ뻾"
        required: false
        default: "false"
      force_evolve:
        description: "Evolution 媛뺤젣 ?ㅽ뻾 (true ?낅젰 ??24h 誘멸꼍怨쇳빐???숈뒿 利됱떆 ?ㅽ뻾)"
        required: false
        default: "false"

jobs:
  jackal:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # [Fix] Node.js 20 deprecation ???(2026-06-02 媛뺤젣 ?꾪솚)
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        # [Bug Fix] jackal_hunter imports pandas via jackal_core, so include it in CI.
        # Keep anthropic pinned to the version already used elsewhere in the repo.
        run: pip install anthropic==0.94.0 httpx yfinance==0.2.55 pandas

      - name: Run JACKAL Hunter
        if: >
          github.event_name != 'workflow_dispatch' ||
          github.event.inputs.session_mode != 'scanner_only'
        env:
          PYTHONIOENCODING: utf-8
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN:      ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_MODEL:     "claude-sonnet-4-6"        # [Fix] ARIA? ?숈씪 紐⑤뜽濡??듭씪
          SUBAGENT_MODEL:      "claude-haiku-4-5-20251001"
          JACKAL_DAILY_BUDGET: "500000"
          JACKAL_AUTOCOMPACT:  "true"
          FRED_API_KEY:        ${{ secrets.FRED_API_KEY }}
          KRX_API_KEY:         ${{ secrets.KRX_API_KEY }}
          FSCAPI_KEY:          ${{ secrets.FSCAPI_KEY }}
        run: |
          ARGS=""
          [ "${{ github.event.inputs.force_hunt }}"   = "true" ] && ARGS="$ARGS --force-hunt"
          [ "${{ github.event.inputs.force_evolve }}" = "true" ] && ARGS="$ARGS --force-evolve"
          python -m jackal.core $ARGS

      - name: Run JACKAL Scanner
        env:
          PYTHONIOENCODING: utf-8
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUBAGENT_MODEL: "claude-haiku-4-5-20251001"
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
          FSCAPI_KEY: ${{ secrets.FSCAPI_KEY }}
        run: |
          ARGS=""
          [ "${{ github.event.inputs.force_scan }}" = "true" ] && ARGS="$ARGS --force"
          python -m jackal.scanner $ARGS

      - name: Save JACKAL session state
        run: |
          set -euo pipefail

          # NOTE: This is a symptom-level hotfix, not the architectural fix.
          # ORCA is treated as truth for data/orca_state.db.
          # JACKAL's SQLite writes in the same window may be lost.
          # Root fix: PR 5 (persistence boundary).
          git config user.name  "JACKAL Session"
          git config user.email "jackal-session@orca-agent"

          # Persistent artifacts owned by JACKAL. Safe to reapply after reset.
          JACKAL_FILES=(
            "jackal/hunt_log.json"
            "jackal/hunt_cooldown.json"
            "jackal/jackal_weights.json"
            "jackal/scan_log.json"
            "jackal/scan_cooldown.json"
            "jackal/recommendation_log.json"
            "jackal/compact_log.json"
            "jackal/jackal_usage_log.json"
            "data/jackal_watchlist.json"
          )

          # JACKAL skill/lesson directories. Reapplied wholesale.
          JACKAL_DIRS=(
            "jackal/skills"
            "jackal/lessons"
          )

          # Intentionally excluded (ORCA-owned or cache-only):
          #   data/orca_state.db                  ORCA truth; JACKAL writes lost in conflict window
          #   data/jackal_news.json               ORCA writes, JACKAL reads
          #   data/jackal_technicals_cache.json   cache
          #   jackal/compact_cache.json           cache
          BACKUP_DIR="$(mktemp -d "${RUNNER_TEMP:-/tmp}/jackal-save-XXXXXX")"
          STASH_NAME="jackal-save-$(date +%s)"
          COPIED=0

          # Back up JACKAL-owned outputs before resetting to origin/main.
          for path in "${JACKAL_FILES[@]}"; do
            if [ -e "$path" ]; then
              mkdir -p "$BACKUP_DIR/$(dirname "$path")"
              cp -p "$path" "$BACKUP_DIR/$path"
              COPIED=1
            fi
          done

          for path in "${JACKAL_DIRS[@]}"; do
            if [ -d "$path" ]; then
              mkdir -p "$BACKUP_DIR/$(dirname "$path")"
              cp -a "$path" "$BACKUP_DIR/$path"
              COPIED=1
            fi
          done

          [ "$COPIED" -eq 0 ] && exit 0

          # Keep a full stash as an extra safety net before destructive reset.
          git stash push -u -m "$STASH_NAME" >/dev/null 2>&1 || true

          for attempt in 1 2 3; do
            echo "Save JACKAL session state attempt $attempt/3"

            # Respect origin/main as source of truth for shared ORCA-owned files.
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            # Reapply only JACKAL-owned artifacts after aligning with origin/main.
            for path in "${JACKAL_FILES[@]}"; do
              if [ -e "$BACKUP_DIR/$path" ]; then
                mkdir -p "$(dirname "$path")"
                cp -p "$BACKUP_DIR/$path" "$path"
              fi
            done

            for path in "${JACKAL_DIRS[@]}"; do
              if [ -d "$BACKUP_DIR/$path" ]; then
                rm -rf "$path"
                mkdir -p "$(dirname "$path")"
                cp -a "$BACKUP_DIR/$path" "$path"
              fi
            done

            git add -- "${JACKAL_FILES[@]}" "${JACKAL_DIRS[@]}" 2>/dev/null || true

            if git diff --cached --quiet; then
              echo "No JACKAL-owned changes to save"
              exit 0
            fi

            git commit -m "🦊 JACKAL Session: $(date +'%Y-%m-%d %H:%M') [skip ci]"

            if git push origin HEAD:main; then
              exit 0
            fi

            echo "Push failed on attempt $attempt, retrying..." >&2
            sleep "$attempt"
          done

          echo "JACKAL session save failed after 3 attempts" >&2
          exit 1
