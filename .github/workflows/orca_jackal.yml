name: JACKAL Session

# Session-oriented JACKAL workflow
# - Full session: Hunter -> Scanner -> Save state
# - Keeps discovery and timing logic separate in code, but runs them as one user-visible session.
# - Manual Scanner workflow remains available for debugging / ad-hoc rescans only.

concurrency:
  group: orca-repo-state
  cancel-in-progress: false

on:
  schedule:
    # Korean session
    - cron: "35 0 * * 1-5"    # KST 09:35  full session (Hunter -> Scanner)
    - cron: "30 4 * * 1-5"    # KST 13:30  scanner refresh
    # US session
    - cron: "35 14 * * 1-5"   # KST 23:35  full session (Hunter -> Scanner)
    - cron: "30 18 * * 1-5"   # KST 03:30  scanner refresh (next KST day)

  workflow_dispatch:
    inputs:
      session_mode:
        description: "Session mode"
        type: choice
        options:
          - full
          - scanner_only
        default: full
      force_hunt:
        description: "Force Hunter even if market state is unclear"
        type: choice
        options:
          - "false"
          - "true"
        default: "false"
      force_scan:
        description: "Force Scanner even if market state is unclear"
        type: choice
        options:
          - "false"
          - "true"
        default: "false"
      force_evolve:
        description: "Force Evolution run even if 24h has not elapsed"
        type: choice
        options:
          - "false"
          - "true"
        default: "false"

jobs:
  jackal:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PYTHONIOENCODING: utf-8
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
      ALPHA_VANTAGE_SLEEP_SECONDS: "0.8"
      USE_UNIFIED_FETCH: "1"
      USE_FDR_MAIN: "1"
      YF_RATE_LIMIT_FAST_FAIL: "1"
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve inputs
        shell: bash
        run: |
          trim_workflow_input() {
            local value="$1"
            value="${value#"${value%%[![:space:]]*}"}"
            value="${value%"${value##*[![:space:]]}"}"
            printf '%s' "$value"
          }

          normalize_bool() {
            local value
            value="$(trim_workflow_input "$1")"
            value="${value,,}"
            if [ "$value" = "true" ] || [ "$value" = "1" ] || [ "$value" = "yes" ]; then
              printf 'true'
            else
              printf 'false'
            fi
          }

          SESSION_MODE_VALUE="$(trim_workflow_input "${{ inputs.session_mode }}")"
          FORCE_HUNT_VALUE="$(normalize_bool "${{ inputs.force_hunt }}")"
          FORCE_SCAN_VALUE="$(normalize_bool "${{ inputs.force_scan }}")"
          FORCE_EVOLVE_VALUE="$(normalize_bool "${{ inputs.force_evolve }}")"

          [ -z "$SESSION_MODE_VALUE" ] && SESSION_MODE_VALUE="full"

          echo "JACKAL_SESSION_MODE=$SESSION_MODE_VALUE" >> "$GITHUB_ENV"
          echo "JACKAL_FORCE_HUNT=$FORCE_HUNT_VALUE" >> "$GITHUB_ENV"
          echo "JACKAL_FORCE_SCAN=$FORCE_SCAN_VALUE" >> "$GITHUB_ENV"
          echo "JACKAL_FORCE_EVOLVE=$FORCE_EVOLVE_VALUE" >> "$GITHUB_ENV"

          echo "Resolved inputs:"
          echo "  session_mode=$SESSION_MODE_VALUE"
          echo "  force_hunt=$FORCE_HUNT_VALUE"
          echo "  force_scan=$FORCE_SCAN_VALUE"
          echo "  force_evolve=$FORCE_EVOLVE_VALUE"

      - name: Pre-flight status
        shell: bash
        run: |
          python - <<'PY'
          import os
          import sqlite3
          from pathlib import Path
          from orca import state

          state.init_state_db()
          db = Path("data/orca_state.db")
          conn = sqlite3.connect(db)
          candidates = conn.execute("SELECT COUNT(*) FROM candidate_registry").fetchone()[0]
          lessons = conn.execute("SELECT COUNT(*) FROM candidate_lessons").fetchone()[0]
          print("Pre-flight:")
          print(f"  orca_state_db: {db.exists()} ({os.path.getsize(db) / 1024 / 1024:.2f} MB)")
          print(f"  jackal_state_db: {Path('data/jackal_state.db').exists()}")
          print(f"  candidate_registry: {candidates}")
          print(f"  candidate_lessons: {lessons}")
          conn.close()
          PY

      - name: Run JACKAL Hunter
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_MODEL: "claude-sonnet-4-6"
          SUBAGENT_MODEL: "claude-haiku-4-5-20251001"
          JACKAL_DAILY_BUDGET: "500000"
          JACKAL_AUTOCOMPACT: "true"
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
          FSCAPI_KEY: ${{ secrets.FSCAPI_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "$JACKAL_SESSION_MODE" = "scanner_only" ]; then
            echo "Skipping Hunter because session_mode=scanner_only"
            exit 0
          fi

          ARGS=""
          [ "$JACKAL_FORCE_HUNT" = "true" ] && ARGS="$ARGS --force-hunt"
          [ "$JACKAL_FORCE_EVOLVE" = "true" ] && ARGS="$ARGS --force-evolve"
          python -m jackal.core $ARGS

      - name: Run JACKAL Scanner
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUBAGENT_MODEL: "claude-haiku-4-5-20251001"
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
          FSCAPI_KEY: ${{ secrets.FSCAPI_KEY }}
        run: |
          ARGS=""
          [ "$JACKAL_FORCE_SCAN" = "true" ] && ARGS="$ARGS --force"
          python -m jackal.scanner $ARGS

      - name: Strict verify
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          failures = []
          required = [Path("data/orca_state.db")]
          for path in required:
              if not path.exists():
                  failures.append(f"Missing required state file: {path}")

          for path in (
              Path("jackal/hunt_log.json"),
              Path("jackal/scan_log.json"),
              Path("data/jackal_watchlist.json"),
          ):
              if path.exists():
                  try:
                      json.loads(path.read_text(encoding="utf-8"))
                  except Exception as exc:
                      failures.append(f"Invalid JSON in {path}: {exc}")

          print("Strict verify:")
          print(f"  data/orca_state.db: {Path('data/orca_state.db').exists()}")
          print(f"  data/jackal_state.db: {Path('data/jackal_state.db').exists()}")
          print(f"  hunt_log: {Path('jackal/hunt_log.json').exists()}")
          print(f"  scan_log: {Path('jackal/scan_log.json').exists()}")

          if failures:
              print("FAILURES:")
              for failure in failures:
                  print(f"  - {failure}")
              raise SystemExit(1)
          print("PASS JACKAL state verification complete")
          PY

      - name: Smoke quality audit
        shell: bash
        run: |
          python scripts/check_requirements_drift.py \
            --output-json "${RUNNER_TEMP}/requirements_drift.json" \
            --output-md "${RUNNER_TEMP}/requirements_drift.md"

          python scripts/check_jackal_operational_intake.py \
            --output-json "${RUNNER_TEMP}/jackal_operational_intake.json" \
            --output-md "${RUNNER_TEMP}/jackal_operational_intake.md"

          python scripts/audit_quality.py --dry-run \
            --output-json "${RUNNER_TEMP}/orca_audit_smoke.json" \
            --output-md "${RUNNER_TEMP}/orca_audit_smoke.md"

      - name: Upload smoke quality artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jackal-session-quality
          path: |
            ${{ runner.temp }}/requirements_drift.json
            ${{ runner.temp }}/requirements_drift.md
            ${{ runner.temp }}/jackal_operational_intake.json
            ${{ runner.temp }}/jackal_operational_intake.md
            ${{ runner.temp }}/orca_audit_smoke.json
            ${{ runner.temp }}/orca_audit_smoke.md
          if-no-files-found: ignore

      - name: Checkpoint DB
        shell: bash
        run: |
          python - <<'PY'
          import sqlite3
          from pathlib import Path
          db = Path("data/orca_state.db")
          if db.exists():
              conn = sqlite3.connect(db)
              conn.execute("PRAGMA wal_checkpoint(TRUNCATE);")
              conn.close()
          PY

          python - <<'PY'
          from orca.state import checkpoint_jackal_db
          checkpoint_jackal_db()
          PY

      - name: Commit and push
        shell: bash
        run: |
          set -euo pipefail

          # NOTE: This is a symptom-level hotfix, not the architectural fix.
          # ORCA is treated as truth for data/orca_state.db.
          # JACKAL's SQLite writes in the same window may be lost.
          # Root fix: PR 5 (persistence boundary).
          git config user.name  "JACKAL Session"
          git config user.email "jackal-session@orca-agent"

          # Persistent artifacts owned by JACKAL. Safe to reapply after reset.
          JACKAL_FILES=(
            "jackal/hunt_log.json"
            "jackal/hunt_cooldown.json"
            "jackal/jackal_weights.json"
            "jackal/scan_log.json"
            "jackal/scan_cooldown.json"
            "jackal/recommendation_log.json"
            "jackal/compact_log.json"
            "jackal/jackal_usage_log.json"
            "data/jackal_watchlist.json"
            "data/jackal_state.db"
          )

          # JACKAL skill/lesson directories. Reapplied wholesale.
          JACKAL_DIRS=(
            "jackal/skills"
            "jackal/lessons"
          )

          # Intentionally excluded (ORCA-owned or cache-only):
          #   data/orca_state.db                  ORCA truth; JACKAL writes lost in conflict window
          #   data/jackal_news.json               ORCA writes, JACKAL reads
          #   data/jackal_technicals_cache.json   cache
          #   jackal/compact_cache.json           cache
          BACKUP_DIR="$(mktemp -d "${RUNNER_TEMP:-/tmp}/jackal-save-XXXXXX")"
          STASH_NAME="jackal-save-$(date +%s)"
          COPIED=0

          # Back up JACKAL-owned outputs before resetting to origin/main.
          for path in "${JACKAL_FILES[@]}"; do
            if [ -e "$path" ]; then
              mkdir -p "$BACKUP_DIR/$(dirname "$path")"
              cp -p "$path" "$BACKUP_DIR/$path"
              COPIED=1
            fi
          done

          for path in "${JACKAL_DIRS[@]}"; do
            if [ -d "$path" ]; then
              mkdir -p "$BACKUP_DIR/$(dirname "$path")"
              cp -a "$path" "$BACKUP_DIR/$path"
              COPIED=1
            fi
          done

          [ "$COPIED" -eq 0 ] && exit 0

          # Keep a full stash as an extra safety net before destructive reset.
          git stash push -u -m "$STASH_NAME" >/dev/null 2>&1 || true

          for attempt in 1 2 3; do
            echo "Save JACKAL session state attempt $attempt/3"

            # Respect origin/main as source of truth for shared ORCA-owned files.
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            # Reapply only JACKAL-owned artifacts after aligning with origin/main.
            for path in "${JACKAL_FILES[@]}"; do
              if [ -e "$BACKUP_DIR/$path" ]; then
                mkdir -p "$(dirname "$path")"
                cp -p "$BACKUP_DIR/$path" "$path"
              fi
            done

            for path in "${JACKAL_DIRS[@]}"; do
              if [ -d "$BACKUP_DIR/$path" ]; then
                rm -rf "$path"
                mkdir -p "$(dirname "$path")"
                cp -a "$BACKUP_DIR/$path" "$path"
              fi
            done

            git add -- "${JACKAL_FILES[@]}" "${JACKAL_DIRS[@]}" 2>/dev/null || true

            if git diff --cached --quiet; then
              echo "No JACKAL-owned changes to save"
              exit 0
            fi

            git commit -m "JACKAL Session: $(date +'%Y-%m-%d %H:%M') [skip ci]"

            if git push origin HEAD:main; then
              exit 0
            fi

            echo "Push failed on attempt $attempt, retrying..." >&2
            sleep "$attempt"
          done

          echo "JACKAL session save failed after 3 attempts" >&2
          exit 1
