name: ORCA Dashboard Pages

on:
  push:
    branches:
      - main
    paths:
      - "reports/**"
      - "data/**"
      - "orca/**"
      - ".github/workflows/pages_dashboard.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: orca-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      USE_FDR_MAIN: "1"
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build dashboard artifact
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python -m orca.dashboard
          mkdir -p site/reports
          cp reports/dashboard.html site/reports/dashboard.html
          cat > site/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0; url=./reports/dashboard.html">
            <title>ORCA Dashboard</title>
          </head>
          <body>
            <p>Redirecting to <a href="./reports/dashboard.html">ORCA Dashboard</a>...</p>
          </body>
          </html>
          EOF

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Verify GitHub Pages is enabled
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.request

          repo = os.environ["REPO"]
          token = os.environ["GH_TOKEN"]
          url = f"https://api.github.com/repos/{repo}/pages"
          req = urllib.request.Request(
              url,
              headers={
                  "User-Agent": "ORCA Pages Check",
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
              },
          )
          try:
              with urllib.request.urlopen(req, timeout=20) as resp:
                  data = json.load(resp)
                  print(f"GitHub Pages enabled: {data.get('html_url', '')}")
          except urllib.error.HTTPError as exc:
              if exc.code == 404:
                  print(
                      "::error::GitHub Pages is not enabled for this repository. "
                      "Go to Settings > Pages and set Build and deployment source to GitHub Actions, then rerun this workflow."
                  )
                  sys.exit(1)
              raise
          PY

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
