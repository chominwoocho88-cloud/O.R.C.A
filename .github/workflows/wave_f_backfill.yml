name: Wave F Backfill

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no DB write)"
        type: boolean
        default: true
      limit:
        description: "Max distinct trading dates (empty = all)"
        type: string
        default: ""
      skip_existing:
        description: "Skip dates with existing snapshot"
        type: boolean
        default: true
      cleanup:
        description: "Cleanup backfill data BEFORE running (recovery mode)"
        type: boolean
        default: false
      expected_snapshots:
        description: "Expected snapshots count"
        type: string
        default: "252"
      expected_linked_lessons:
        description: "Expected linked backtest lessons"
        type: string
        default: "1260"

concurrency:
  group: orca-repo-state
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    env:
      USE_FDR_MAIN: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve inputs
        shell: bash
        run: |
          trim_workflow_input() {
            local value="$1"
            value="${value#"${value%%[![:space:]]*}"}"
            value="${value%"${value##*[![:space:]]}"}"
            printf '%s' "$value"
          }

          normalize_bool() {
            local value
            value="$(trim_workflow_input "$1")"
            value="${value,,}"
            if [ "$value" = "true" ] || [ "$value" = "1" ] || [ "$value" = "yes" ]; then
              printf 'true'
            else
              printf 'false'
            fi
          }

          BACKFILL_DRY_RUN="$(normalize_bool "${{ inputs.dry_run }}")"
          BACKFILL_LIMIT="$(trim_workflow_input "${{ inputs.limit }}")"
          BACKFILL_SKIP_EXISTING="$(normalize_bool "${{ inputs.skip_existing }}")"
          BACKFILL_CLEANUP="$(normalize_bool "${{ inputs.cleanup }}")"
          EXPECTED_SNAPSHOTS_VALUE="$(trim_workflow_input "${{ inputs.expected_snapshots }}")"
          EXPECTED_LINKED_LESSONS_VALUE="$(trim_workflow_input "${{ inputs.expected_linked_lessons }}")"

          if [ -z "$EXPECTED_SNAPSHOTS_VALUE" ]; then
            EXPECTED_SNAPSHOTS_VALUE="252"
          fi
          if [ -z "$EXPECTED_LINKED_LESSONS_VALUE" ]; then
            EXPECTED_LINKED_LESSONS_VALUE="1260"
          fi

          echo "BACKFILL_DRY_RUN=$BACKFILL_DRY_RUN" >> "$GITHUB_ENV"
          echo "BACKFILL_LIMIT=$BACKFILL_LIMIT" >> "$GITHUB_ENV"
          echo "BACKFILL_SKIP_EXISTING=$BACKFILL_SKIP_EXISTING" >> "$GITHUB_ENV"
          echo "BACKFILL_CLEANUP=$BACKFILL_CLEANUP" >> "$GITHUB_ENV"
          echo "EXPECTED_SNAPSHOTS=$EXPECTED_SNAPSHOTS_VALUE" >> "$GITHUB_ENV"
          echo "EXPECTED_LINKED_LESSONS=$EXPECTED_LINKED_LESSONS_VALUE" >> "$GITHUB_ENV"

          echo "Resolved inputs:"
          echo "  dry_run=$BACKFILL_DRY_RUN"
          echo "  limit=${BACKFILL_LIMIT:-all}"
          echo "  skip_existing=$BACKFILL_SKIP_EXISTING"
          echo "  cleanup=$BACKFILL_CLEANUP"
          echo "  expected_snapshots=$EXPECTED_SNAPSHOTS_VALUE"
          echo "  expected_linked_lessons=$EXPECTED_LINKED_LESSONS_VALUE"

      - name: Pre-flight status
        run: |
          python - <<'PY'
          import sqlite3
          from orca import state

          state.init_state_db()
          conn = sqlite3.connect('data/orca_state.db')
          null_count = conn.execute("""
              SELECT COUNT(*)
              FROM candidate_lessons l
              JOIN candidate_registry c ON c.candidate_id = l.candidate_id
              WHERE c.source_event_type='backtest'
                AND l.context_snapshot_id IS NULL
          """).fetchone()[0]
          linked_count = conn.execute("""
              SELECT COUNT(*)
              FROM candidate_lessons l
              JOIN candidate_registry c ON c.candidate_id = l.candidate_id
              WHERE c.source_event_type='backtest'
                AND l.context_snapshot_id IS NOT NULL
          """).fetchone()[0]
          snap_count = conn.execute("""
              SELECT COUNT(*)
              FROM lesson_context_snapshot
              WHERE source_event_type='backtest_backfill'
          """).fetchone()[0]
          print('Pre-flight:')
          print(f'  Backtest lessons without context: {null_count}')
          print(f'  Backtest lessons with context: {linked_count}')
          print(f'  backtest_backfill snapshots: {snap_count}')
          conn.close()
          PY

      - name: Cleanup requested during dry run
        if: env.BACKFILL_CLEANUP == 'true' && env.BACKFILL_DRY_RUN == 'true'
        run: |
          echo "cleanup=true was requested, but dry_run=true prevents DB writes."
          echo "Re-run with dry_run=false to cleanup and execute backfill."

      - name: Cleanup backfill data
        if: env.BACKFILL_CLEANUP == 'true' && env.BACKFILL_DRY_RUN != 'true'
        run: |
          python - <<'PY'
          from orca.context_snapshot import cleanup_backfill_data

          result = cleanup_backfill_data(verbose=True)
          print(f'Cleanup result: {result}')
          PY

      - name: Run backfill
        env:
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          ALPHA_VANTAGE_SLEEP_SECONDS: "0.8"
          USE_UNIFIED_FETCH: "1"
        run: |
          ARGS=""
          if [ "$BACKFILL_DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "$BACKFILL_LIMIT" ]; then
            ARGS="$ARGS --limit $BACKFILL_LIMIT"
          fi
          if [ "$BACKFILL_SKIP_EXISTING" = "true" ]; then
            ARGS="$ARGS --skip-existing"
          else
            ARGS="$ARGS --include-existing"
          fi
          python scripts/backfill_lesson_context.py --verbose $ARGS

      - name: Strict verify
        if: env.BACKFILL_DRY_RUN != 'true'
        run: |
          python - <<'PY'
          import os
          from orca.context_snapshot import verify_backfill_completeness

          result = verify_backfill_completeness(
              expected_snapshots=int(os.environ.get('EXPECTED_SNAPSHOTS', '252')),
              expected_linked_lessons=int(os.environ.get('EXPECTED_LINKED_LESSONS', '1260')),
              require_market_metrics=True,
          )
          print('Verify result:')
          for key, value in result.items():
              print(f'  {key}: {value}')

          if not result['passed']:
              print()
              print('FAILURES:')
              for failure in result['failures']:
                  print(f'  - {failure}')
              raise SystemExit(1)

          print()
          print('PASS Backfill verification complete')
          PY

      - name: Checkpoint DB
        if: env.BACKFILL_DRY_RUN != 'true'
        run: |
          python - <<'PY'
          import os
          import sqlite3

          conn = sqlite3.connect('data/orca_state.db')
          conn.execute('PRAGMA wal_checkpoint(TRUNCATE);')
          conn.close()

          for suffix in ('-wal', '-shm'):
              path = f'data/orca_state.db{suffix}'
              if os.path.exists(path):
                  os.remove(path)
                  print(f'Removed: {path}')
          print('Checkpoint complete')
          PY

      - name: Commit and push
        if: env.BACKFILL_DRY_RUN != 'true'
        run: |
          git config user.name "Wave F Backfill"
          git config user.email "wave-f-backfill@orca-agent"
          echo "Git status before staging:"
          git status --short
          git add -f data/orca_state.db
          echo "Staged state diff:"
          git diff --cached --stat
          git diff --cached --name-status
          git diff --cached --quiet && {
            echo "no state changes to commit"
            echo "Git status after push:"
            git status --short
            exit 0
          }
          git commit -m "chore: Wave F Phase 1.3 - Backfill executed via Actions [skip ci]"
          echo "Commit created: $(git rev-parse --short HEAD)"
          echo "Rebasing committed state on origin/main before push"
          git pull --rebase origin main || {
            git rebase --abort || true
            exit 1
          }
          if git push; then
            echo "Push succeeded"
          else
            echo "Initial push failed; rebasing once and retrying" >&2
            git pull --rebase origin main || {
              git rebase --abort || true
              exit 1
            }
            git push
            echo "Push succeeded after rebase retry"
          fi
          echo "Git status after push:"
          git status --short
