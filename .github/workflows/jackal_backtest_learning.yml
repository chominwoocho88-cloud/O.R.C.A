name: JACKAL Backtest Learning

concurrency:
  group: orca-repo-state
  cancel-in-progress: false

on:
  schedule:
    - cron: "10 0 * * 1-5"
    - cron: "30 1 1 * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "incremental / full"
        required: false
        default: "incremental"
      artifact_run_id:
        description: "orca_backtest.yml success run ID (Mode 1: artifact handoff)"
        required: false
        default: ""
      orca_months:
        description: "ORCA refresh months (Mode 2 only)"
        required: false
        default: "13"
      backtest_days:
        description: "JACKAL backtest days"
        required: false
        default: "252"
      history_days:
        description: "Universe price history days"
        required: false
        default: "750"
      materialize_mode:
        description: "replace / add_missing / fail_on_duplicate"
        required: false
        default: "replace"
      auto_context_snapshot:
        description: "Auto context snapshot per lesson"
        type: boolean
        default: true

jobs:
  learn:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
      ALPHA_VANTAGE_SLEEP_SECONDS: "0.8"
      USE_UNIFIED_FETCH: "1"
      USE_FDR_MAIN: "1"
      YF_RATE_LIMIT_FAST_FAIL: "1"
    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve mode
        shell: bash
        run: |
          MODE="incremental"
          RUN_ORCA_REFRESH="false"
          USE_ARTIFACT_HANDOFF="false"
          ARTIFACT_RUN_ID=""
          ORCA_MONTHS="${{ github.event.inputs.orca_months || '13' }}"
          JACKAL_BACKTEST_DAYS_VALUE="${{ github.event.inputs.backtest_days || '252' }}"
          JACKAL_HISTORY_DAYS_VALUE="${{ github.event.inputs.history_days || '750' }}"
          JACKAL_MATERIALIZE_MODE_VALUE="${{ github.event.inputs.materialize_mode || 'replace' }}"
          JACKAL_AUTO_CONTEXT_SNAPSHOT_VALUE="${{ github.event.inputs.auto_context_snapshot || 'true' }}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ github.event.inputs.mode || 'incremental' }}"
            ARTIFACT_RUN_ID="${{ github.event.inputs.artifact_run_id || '' }}"
          elif [ "${{ github.event.schedule }}" = "30 1 1 * *" ]; then
            MODE="full"
          fi

          if [ "$MODE" = "full" ] && [ -n "$ARTIFACT_RUN_ID" ]; then
            USE_ARTIFACT_HANDOFF="true"
            echo "Mode 1: Artifact handoff (ORCA refresh skipped)"
          elif [ "$MODE" = "full" ]; then
            RUN_ORCA_REFRESH="true"
            echo "::warning::Mode 2: Full rebuild with self-refresh (artifact not provided)"
            echo "Mode 2: Full rebuild with self-refresh"
          else
            echo "Mode 3: Daily incremental"
          fi

          echo "BACKTEST_MODE=$MODE" >> "$GITHUB_ENV"
          echo "RUN_ORCA_REFRESH=$RUN_ORCA_REFRESH" >> "$GITHUB_ENV"
          echo "USE_ARTIFACT_HANDOFF=$USE_ARTIFACT_HANDOFF" >> "$GITHUB_ENV"
          echo "ARTIFACT_RUN_ID=$ARTIFACT_RUN_ID" >> "$GITHUB_ENV"
          echo "ORCA_BACKTEST_MONTHS=$ORCA_MONTHS" >> "$GITHUB_ENV"
          echo "JACKAL_BACKTEST_DAYS=$JACKAL_BACKTEST_DAYS_VALUE" >> "$GITHUB_ENV"
          echo "JACKAL_HISTORY_DAYS=$JACKAL_HISTORY_DAYS_VALUE" >> "$GITHUB_ENV"
          echo "JACKAL_MATERIALIZE_MODE=$JACKAL_MATERIALIZE_MODE_VALUE" >> "$GITHUB_ENV"
          echo "JACKAL_AUTO_CONTEXT_SNAPSHOT=$JACKAL_AUTO_CONTEXT_SNAPSHOT_VALUE" >> "$GITHUB_ENV"

      - name: Download preflight ORCA artifact
        if: env.USE_ARTIFACT_HANDOFF == 'true'
        uses: actions/download-artifact@v4
        with:
          name: research-state-${{ github.event.inputs.artifact_run_id }}
          path: _artifact_handoff/
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event.inputs.artifact_run_id }}

      - name: Checkpoint + verify artifact DB
        if: env.USE_ARTIFACT_HANDOFF == 'true'
        shell: bash
        run: |
          python - <<'PY'
          import os
          import sqlite3
          import sys

          candidates = [
              "_artifact_handoff/data/orca_state.db",
              "_artifact_handoff/orca_state.db",
          ]

          artifact_db = None
          for path in candidates:
              if os.path.exists(path):
                  artifact_db = path
                  print(f"Found artifact DB: {path}")
                  break

          if artifact_db is None:
              print("::error::Artifact DB not found in expected paths")
              print("Paths searched:")
              for path in candidates:
                  print(f"  - {path}")
              if os.path.exists("_artifact_handoff"):
                  print("_artifact_handoff contents:")
                  for root, _, files in os.walk("_artifact_handoff"):
                      for filename in files:
                          print(f"  {os.path.join(root, filename)}")
              sys.exit(1)

          conn = sqlite3.connect(artifact_db)
          conn.execute("PRAGMA wal_checkpoint(TRUNCATE);")
          conn.close()

          for suffix in ("-wal", "-shm"):
              path = f"{artifact_db}{suffix}"
              if os.path.exists(path):
                  os.remove(path)
                  print(f"Removed: {path}")

          conn = sqlite3.connect(artifact_db)
          try:
              candidate_count = conn.execute(
                  """
                  SELECT COUNT(*)
                  FROM candidate_registry
                  WHERE source_event_type='backtest'
                  """
              ).fetchone()[0]
              outcomes = conn.execute(
                  "SELECT COUNT(*) FROM candidate_outcomes"
              ).fetchone()[0]
              lessons = conn.execute(
                  "SELECT COUNT(*) FROM candidate_lessons"
              ).fetchone()[0]
              orca_sessions = conn.execute(
                  "SELECT COUNT(*) FROM backtest_sessions WHERE system='orca'"
              ).fetchone()[0]
              jackal_sessions = conn.execute(
                  "SELECT COUNT(*) FROM backtest_sessions WHERE system='jackal'"
              ).fetchone()[0]
          finally:
              conn.close()

          print("=" * 50)
          print("Artifact verified (isolated):")
          print(f"  path: {artifact_db}")
          print(f"  candidate_registry(backtest): {candidate_count}")
          print(f"  candidate_outcomes: {outcomes}")
          print(f"  candidate_lessons: {lessons}")
          print(f"  ORCA sessions: {orca_sessions}")
          print(f"  JACKAL sessions: {jackal_sessions}")
          print("=" * 50)

          assert candidate_count >= 1000, f"backtest candidates insufficient: {candidate_count}"
          assert outcomes >= candidate_count, f"outcomes < candidates: {outcomes} < {candidate_count}"
          assert lessons >= 1000, f"lessons insufficient: {lessons}"
          assert orca_sessions >= 1, "ORCA session missing"
          assert jackal_sessions >= 1, "JACKAL session missing"

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as handle:
              handle.write(f"ARTIFACT_DB_PATH={artifact_db}\n")

          print("PASS Artifact verified in isolated dir")
          PY

      - name: Promote artifact DB
        if: env.USE_ARTIFACT_HANDOFF == 'true'
        shell: bash
        run: |
          python - <<'PY'
          import os
          import shutil
          import sqlite3

          src = os.environ["ARTIFACT_DB_PATH"]
          dst = "data/orca_state.db"

          shutil.copy(src, dst)
          print(f"Promoted {src} -> {dst}")

          conn = sqlite3.connect(dst)
          try:
              candidate_count = conn.execute(
                  """
                  SELECT COUNT(*)
                  FROM candidate_registry
                  WHERE source_event_type='backtest'
                  """
              ).fetchone()[0]
          finally:
              conn.close()

          print(f"Main DB now contains {candidate_count} backtest candidates")
          PY

      - name: Refresh ORCA research session
        if: env.RUN_ORCA_REFRESH == 'true'
        env:
          PYTHONIOENCODING: utf-8
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
          FSCAPI_KEY: ${{ secrets.FSCAPI_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          ALPHA_VANTAGE_SLEEP_SECONDS: "0.8"
          USE_UNIFIED_FETCH: "1"
          USE_FDR_MAIN: "1"
        run: |
          python -m orca.backtest --months "${ORCA_BACKTEST_MONTHS}" --walk-forward --fail-on-empty-dynamic-fetch

      - name: Run JACKAL backtest learning
        env:
          PYTHONIOENCODING: utf-8
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
          FSCAPI_KEY: ${{ secrets.FSCAPI_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          ALPHA_VANTAGE_SLEEP_SECONDS: "0.8"
          USE_UNIFIED_FETCH: "1"
          USE_FDR_MAIN: "1"
        run: |
          # Artifact handoff promotes the ORCA research DB above; JACKAL still
          # needs to materialize missing lessons from that promoted state.
          python -m jackal.backtest \
            --mode "${BACKTEST_MODE}" \
            --backtest-days "${JACKAL_BACKTEST_DAYS}" \
            --history-days "${JACKAL_HISTORY_DAYS}" \
            --materialize-mode "${JACKAL_MATERIALIZE_MODE}" \
            --auto-context-snapshot "${JACKAL_AUTO_CONTEXT_SNAPSHOT}"

      - name: Save learning state
        run: |
          git config user.name "JACKAL Learning"
          git config user.email "jackal-learning@orca-agent"

          python - <<'PY'
          import sqlite3
          from pathlib import Path

          db = Path("data/orca_state.db")
          if db.exists():
              conn = sqlite3.connect(db)
              conn.execute("PRAGMA wal_checkpoint(TRUNCATE);")
              conn.close()
          PY

          python - <<'PY'
          from orca.state import checkpoint_jackal_db

          checkpoint_jackal_db()
          PY

          git add -f data/orca_state.db 2>/dev/null || true
          git add -f data/jackal_state.db 2>/dev/null || true
          git diff --cached --quiet && exit 0

          git commit -m "JACKAL learning: $(date +'%Y-%m-%d %H:%M') [${BACKTEST_MODE}] [skip ci]"

          git push || {
            git pull --rebase origin main || git rebase --abort
            git push
          }
