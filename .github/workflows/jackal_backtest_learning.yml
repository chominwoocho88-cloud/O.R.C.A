name: JACKAL Backtest Learning

concurrency:
  group: orca-repo-state
  cancel-in-progress: false

on:
  schedule:
    - cron: "10 0 * * 1-5"
    - cron: "30 1 1 * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "incremental / full"
        required: false
        default: "incremental"
      artifact_run_id:
        description: "orca_backtest.yml의 성공 run ID (Mode 1: artifact handoff)"
        required: false
        default: ""

jobs:
  learn:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve mode
        shell: bash
        run: |
          MODE="incremental"
          RUN_ORCA_REFRESH="false"
          USE_ARTIFACT_HANDOFF="false"
          ARTIFACT_RUN_ID=""

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ github.event.inputs.mode || 'incremental' }}"
            ARTIFACT_RUN_ID="${{ github.event.inputs.artifact_run_id || '' }}"
          elif [ "${{ github.event.schedule }}" = "30 1 1 * *" ]; then
            MODE="full"
          fi

          if [ "$MODE" = "full" ] && [ -n "$ARTIFACT_RUN_ID" ]; then
            USE_ARTIFACT_HANDOFF="true"
            echo "Mode 1: Artifact handoff (ORCA refresh skipped)"
          elif [ "$MODE" = "full" ]; then
            RUN_ORCA_REFRESH="true"
            echo "::warning::Mode 2: Full rebuild with self-refresh (artifact 미사용)"
            echo "Mode 2: Full rebuild with self-refresh"
          else
            echo "Mode 3: Daily incremental"
          fi

          echo "BACKTEST_MODE=$MODE" >> "$GITHUB_ENV"
          echo "RUN_ORCA_REFRESH=$RUN_ORCA_REFRESH" >> "$GITHUB_ENV"
          echo "USE_ARTIFACT_HANDOFF=$USE_ARTIFACT_HANDOFF" >> "$GITHUB_ENV"
          echo "ARTIFACT_RUN_ID=$ARTIFACT_RUN_ID" >> "$GITHUB_ENV"

      - name: Download preflight ORCA artifact
        if: env.USE_ARTIFACT_HANDOFF == 'true'
        uses: actions/download-artifact@v4
        with:
          name: research-state-${{ github.event.inputs.artifact_run_id }}
          path: ./
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event.inputs.artifact_run_id }}

      - name: Verify ORCA artifact
        if: env.USE_ARTIFACT_HANDOFF == 'true'
        shell: bash
        run: |
          if [ ! -f data/orca_state.db ]; then
            echo "::error::data/orca_state.db not found in artifact"
            echo "::error::orca_backtest.yml run #${ARTIFACT_RUN_ID} 가 성공했고 artifact 가 90일 보존 기간 내인지 확인"
            exit 1
          fi

          SIZE=$(stat -c%s data/orca_state.db)
          if [ "$SIZE" -lt 1024 ]; then
            echo "::error::data/orca_state.db size ${SIZE} bytes < 1KB, artifact 손상 의심"
            exit 1
          fi

          python - <<'PY'
          import sqlite3
          conn = sqlite3.connect("data/orca_state.db")
          try:
              tables = [row[0] for row in conn.execute(
                  "SELECT name FROM sqlite_master WHERE type='table'"
              )]
          finally:
              conn.close()
          assert "backtest_sessions" in tables, (
              "backtest_sessions 테이블 없음, ORCA research 비정상"
          )
          print(f"Artifact verified: {len(tables)} tables")
          PY

      - name: Refresh ORCA research session
        if: env.RUN_ORCA_REFRESH == 'true'
        env:
          PYTHONIOENCODING: utf-8
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
          FSCAPI_KEY: ${{ secrets.FSCAPI_KEY }}
        run: |
          python -m orca.backtest --months 13 --walk-forward --fail-on-empty-dynamic-fetch

      - name: Run JACKAL backtest learning
        env:
          PYTHONIOENCODING: utf-8
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
          FSCAPI_KEY: ${{ secrets.FSCAPI_KEY }}
        run: |
          python -m jackal.backtest --mode "${BACKTEST_MODE}"

      - name: Save learning state
        run: |
          git config user.name "JACKAL Learning"
          git config user.email "jackal-learning@orca-agent"

          python - <<'PY'
          import sqlite3
          from pathlib import Path
          db = Path("data/orca_state.db")
          if db.exists():
              conn = sqlite3.connect(db)
              conn.execute("PRAGMA wal_checkpoint(TRUNCATE);")
              conn.close()
          PY

          python - <<'PY'
          from orca.state import checkpoint_jackal_db
          checkpoint_jackal_db()
          PY

          git add -f data/orca_state.db 2>/dev/null || true
          git add -f data/jackal_state.db 2>/dev/null || true
          git diff --cached --quiet && exit 0

          git commit -m "JACKAL learning: $(date +'%Y-%m-%d %H:%M') [${BACKTEST_MODE}] [skip ci]"

          git push || {
            git pull --rebase origin main || git rebase --abort
            git push
          }
