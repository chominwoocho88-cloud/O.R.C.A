name: Migrate to data/ folder

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Move JSON files to data/
        run: |
          mkdir -p data

          for f in memory.json accuracy.json sentiment.json rotation.json \
                   aria_weights.json aria_lessons.json aria_cost.json \
                   aria_market_data.json morning_baseline.json \
                   portfolio.json; do
            [ -f "$f" ] && git mv "$f" "data/$f" && echo "이동: $f" || echo "없음: $f"
          done

      - name: Commit
        run: |
          git config user.name "ARIA Bot"
          git config user.email "aria@github-actions"
          git diff --staged --quiet || git commit -m "refactor: data/ 폴더 통합"
          git push
