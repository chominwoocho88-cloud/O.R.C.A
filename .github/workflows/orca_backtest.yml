name: ORCA Backtest

concurrency:
  group: orca-research-backtest
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      months:
        description: "Backtest months"
        type: choice
        options:
          - "13"
          - "36"
        default: "13"
      walk_forward:
        description: "Walk-forward mode"
        type: choice
        options:
          - "true"
          - "false"
        default: "true"
      expected_min_candidates:
        description: "Minimum backtest candidate rows"
        type: string
        default: "1000"
      expected_min_lessons:
        description: "Minimum backtest lessons"
        type: string
        default: "1000"
      expected_min_orca_sessions:
        description: "Minimum ORCA sessions"
        type: string
        default: "1"
      expected_min_jackal_sessions:
        description: "Minimum JACKAL sessions"
        type: string
        default: "1"

jobs:
  run-backtest:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PYTHONIOENCODING: utf-8
      USE_FDR_MAIN: "1"
      USE_UNIFIED_FETCH: "1"
      YF_RATE_LIMIT_FAST_FAIL: "1"
      ALPHA_VANTAGE_SLEEP_SECONDS: "0.8"
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve inputs
        shell: bash
        run: |
          trim_workflow_input() {
            local value="$1"
            value="${value#"${value%%[![:space:]]*}"}"
            value="${value%"${value##*[![:space:]]}"}"
            printf '%s' "$value"
          }

          normalize_bool() {
            local value
            value="$(trim_workflow_input "$1")"
            value="${value,,}"
            if [ "$value" = "true" ] || [ "$value" = "1" ] || [ "$value" = "yes" ]; then
              printf 'true'
            else
              printf 'false'
            fi
          }

          ORCA_BACKTEST_MONTHS="$(trim_workflow_input "${{ inputs.months }}")"
          ORCA_BACKTEST_WALK_FORWARD="$(normalize_bool "${{ inputs.walk_forward }}")"
          EXPECTED_MIN_CANDIDATES_VALUE="$(trim_workflow_input "${{ inputs.expected_min_candidates }}")"
          EXPECTED_MIN_LESSONS_VALUE="$(trim_workflow_input "${{ inputs.expected_min_lessons }}")"
          EXPECTED_MIN_ORCA_SESSIONS_VALUE="$(trim_workflow_input "${{ inputs.expected_min_orca_sessions }}")"
          EXPECTED_MIN_JACKAL_SESSIONS_VALUE="$(trim_workflow_input "${{ inputs.expected_min_jackal_sessions }}")"

          [ -z "$ORCA_BACKTEST_MONTHS" ] && ORCA_BACKTEST_MONTHS="13"
          [ -z "$EXPECTED_MIN_CANDIDATES_VALUE" ] && EXPECTED_MIN_CANDIDATES_VALUE="1000"
          [ -z "$EXPECTED_MIN_LESSONS_VALUE" ] && EXPECTED_MIN_LESSONS_VALUE="1000"
          [ -z "$EXPECTED_MIN_ORCA_SESSIONS_VALUE" ] && EXPECTED_MIN_ORCA_SESSIONS_VALUE="1"
          [ -z "$EXPECTED_MIN_JACKAL_SESSIONS_VALUE" ] && EXPECTED_MIN_JACKAL_SESSIONS_VALUE="1"

          echo "ORCA_BACKTEST_MONTHS=$ORCA_BACKTEST_MONTHS" >> "$GITHUB_ENV"
          echo "ORCA_BACKTEST_WALK_FORWARD=$ORCA_BACKTEST_WALK_FORWARD" >> "$GITHUB_ENV"
          echo "EXPECTED_MIN_CANDIDATES=$EXPECTED_MIN_CANDIDATES_VALUE" >> "$GITHUB_ENV"
          echo "EXPECTED_MIN_LESSONS=$EXPECTED_MIN_LESSONS_VALUE" >> "$GITHUB_ENV"
          echo "EXPECTED_MIN_ORCA_SESSIONS=$EXPECTED_MIN_ORCA_SESSIONS_VALUE" >> "$GITHUB_ENV"
          echo "EXPECTED_MIN_JACKAL_SESSIONS=$EXPECTED_MIN_JACKAL_SESSIONS_VALUE" >> "$GITHUB_ENV"

          echo "Resolved inputs:"
          echo "  months=$ORCA_BACKTEST_MONTHS"
          echo "  walk_forward=$ORCA_BACKTEST_WALK_FORWARD"
          echo "  expected_min_candidates=$EXPECTED_MIN_CANDIDATES_VALUE"
          echo "  expected_min_lessons=$EXPECTED_MIN_LESSONS_VALUE"
          echo "  expected_min_orca_sessions=$EXPECTED_MIN_ORCA_SESSIONS_VALUE"
          echo "  expected_min_jackal_sessions=$EXPECTED_MIN_JACKAL_SESSIONS_VALUE"

      - name: Pre-flight status
        shell: bash
        run: |
          python - <<'PY'
          import os
          import sqlite3
          from pathlib import Path
          from orca import state

          state.init_state_db()
          db = Path("data/orca_state.db")
          conn = sqlite3.connect(db)
          candidates = conn.execute("SELECT COUNT(*) FROM candidate_registry WHERE source_event_type='backtest'").fetchone()[0]
          lessons = conn.execute("SELECT COUNT(*) FROM candidate_lessons").fetchone()[0]
          orca_sessions = conn.execute("SELECT COUNT(*) FROM backtest_sessions WHERE system='orca'").fetchone()[0]
          jackal_sessions = conn.execute("SELECT COUNT(*) FROM backtest_sessions WHERE system='jackal'").fetchone()[0]
          print("Pre-flight:")
          print(f"  db_mb: {os.path.getsize(db) / 1024 / 1024:.2f}")
          print(f"  backtest candidates: {candidates}")
          print(f"  candidate lessons: {lessons}")
          print(f"  ORCA sessions: {orca_sessions}")
          print(f"  JACKAL sessions: {jackal_sessions}")
          conn.close()
          PY

      - name: Run ORCA Backtest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
        run: |
          # Default path remains:
          # python -m orca.backtest --months 13 --walk-forward --fail-on-empty-dynamic-fetch
          ARGS="--months $ORCA_BACKTEST_MONTHS --fail-on-empty-dynamic-fetch"
          if [ "$ORCA_BACKTEST_WALK_FORWARD" = "true" ]; then
            ARGS="$ARGS --walk-forward"
          fi
          python -m orca.backtest $ARGS

      - name: Run JACKAL Backtest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
        run: python -m jackal.backtest --mode full

      - name: Checkpoint ORCA DB
        shell: bash
        run: |
          python - <<'PY'
          import os
          import sqlite3

          conn = sqlite3.connect("data/orca_state.db")
          conn.execute("PRAGMA wal_checkpoint(TRUNCATE);")
          conn.close()

          for suffix in ("-wal", "-shm"):
              path = f"data/orca_state.db{suffix}"
              if os.path.exists(path):
                  os.remove(path)
                  print(f"Removed: {path}")
          print("Checkpoint complete")
          PY

      - name: Strict verify before upload
        shell: bash
        run: |
          python - <<'PY'
          import os
          import sqlite3
          import sys

          expected_candidates = int(os.environ.get("EXPECTED_MIN_CANDIDATES", "1000"))
          expected_lessons = int(os.environ.get("EXPECTED_MIN_LESSONS", "1000"))
          expected_orca_sessions = int(os.environ.get("EXPECTED_MIN_ORCA_SESSIONS", "1"))
          expected_jackal_sessions = int(os.environ.get("EXPECTED_MIN_JACKAL_SESSIONS", "1"))

          conn = sqlite3.connect("data/orca_state.db")
          try:
              candidate_count = conn.execute(
                  """
                  SELECT COUNT(*)
                  FROM candidate_registry
                  WHERE source_event_type='backtest'
                  """
              ).fetchone()[0]
              outcomes = conn.execute("SELECT COUNT(*) FROM candidate_outcomes").fetchone()[0]
              lessons = conn.execute("SELECT COUNT(*) FROM candidate_lessons").fetchone()[0]
              orca_sessions = conn.execute(
                  "SELECT COUNT(*) FROM backtest_sessions WHERE system='orca'"
              ).fetchone()[0]
              jackal_sessions = conn.execute(
                  "SELECT COUNT(*) FROM backtest_sessions WHERE system='jackal'"
              ).fetchone()[0]
              all_sessions = list(
                  conn.execute(
                      """
                      SELECT system, session_id, started_at
                      FROM backtest_sessions
                      ORDER BY started_at DESC
                      """
                  )
              )
              session_dist = list(
                  conn.execute(
                      """
                      SELECT source_session_id, COUNT(*)
                      FROM candidate_registry
                      WHERE source_event_type='backtest'
                      GROUP BY source_session_id
                      ORDER BY COUNT(*) DESC
                      """
                  )
              )
              date_stats = conn.execute(
                  """
                  SELECT
                      MIN(analysis_date) AS min_date,
                      MAX(analysis_date) AS max_date,
                      COUNT(DISTINCT analysis_date) AS distinct_days
                  FROM candidate_registry
                  WHERE source_event_type='backtest'
                  """
              ).fetchone()
              family_dist = list(
                  conn.execute(
                      """
                      SELECT signal_family, COUNT(*)
                      FROM candidate_registry
                      WHERE source_event_type='backtest'
                      GROUP BY signal_family
                      ORDER BY COUNT(*) DESC
                      """
                  )
              )
          finally:
              conn.close()

          print("=" * 60)
          print("Pre-upload DB verification")
          print("=" * 60)
          print("Main counts:")
          print(f"  candidate_registry(backtest): {candidate_count}")
          print(f"  candidate_outcomes: {outcomes}")
          print(f"  candidate_lessons: {lessons}")
          print()
          print("Session summary:")
          print(f"  ORCA sessions: {orca_sessions}")
          print(f"  JACKAL sessions: {jackal_sessions}")
          print()
          print(f"All sessions ({len(all_sessions)}):")
          for system_name, session_id, started_at in all_sessions[:10]:
              print(f"  [{system_name}] {session_id[:20]}... started {started_at}")
          print()
          print("Candidate distribution by session:")
          for session_id, count in session_dist[:5]:
              session_short = session_id[:20] if session_id else "NULL"
              print(f"  {session_short}...: {count}")
          print()
          print("Date coverage:")
          if date_stats[0]:
              print(f"  range: {date_stats[0]} ~ {date_stats[1]}")
              print(f"  distinct days: {date_stats[2]}")
          else:
              print("  (empty)")
          print()
          print("Signal family distribution:")
          for family_name, count in family_dist:
              print(f"  {family_name}: {count}")
          print("=" * 60)

          errors = []
          if candidate_count < expected_candidates:
              errors.append(f"backtest candidates {candidate_count} < expected {expected_candidates}")
          if outcomes < candidate_count:
              errors.append(f"outcomes < candidates: {outcomes} < {candidate_count}")
          if lessons < expected_lessons:
              errors.append(f"lessons {lessons} < expected {expected_lessons}")
          if orca_sessions < expected_orca_sessions:
              errors.append(f"ORCA sessions {orca_sessions} < expected {expected_orca_sessions}")
          if jackal_sessions < expected_jackal_sessions:
              errors.append(f"JACKAL sessions {jackal_sessions} < expected {expected_jackal_sessions}")

          if errors:
              print("FAIL Pre-upload verify FAILED:")
              for error in errors:
                  print(f"  - {error}")
              sys.exit(1)

          print("PASS Pre-upload verify PASSED")
          PY

      - name: Upload research state
        uses: actions/upload-artifact@v4
        with:
          name: research-state-${{ github.run_id }}
          if-no-files-found: warn
          path: data/orca_state.db
          retention-days: 90

  policy-eval:
    needs: run-backtest
    uses: ./.github/workflows/policy_eval.yml
    with:
      artifact_name: research-state-${{ github.run_id }}
      strict: false

  policy-promote:
    if: ${{ needs.policy-eval.result == 'success' }}
    needs: policy-eval
    uses: ./.github/workflows/policy_promote.yml
    with:
      artifact_name: ${{ needs.policy-eval.outputs.artifact_name }}
