name: DB Vacuum

on:
  workflow_dispatch:
    inputs:
      migrate_cold:
        description: "Move cold archive/log/backtest rows before VACUUM"
        type: choice
        options:
          - "true"
          - "false"
        default: "true"
      threshold_runs:
        description: "Archive runs to keep in hot DB"
        type: string
        default: "1"
  schedule:
    # KST monthly 1st 03:00 = UTC previous day 18:00.
    - cron: "0 18 1 * *"

concurrency:
  group: orca-repo-state
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  vacuum:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run DB maintenance
        run: |
          THRESHOLD="$(echo "${{ inputs.threshold_runs || '1' }}" | xargs)"
          ARGS="--threshold-runs ${THRESHOLD} --no-backup"
          if [ "${{ inputs.migrate_cold || 'true' }}" = "true" ]; then
            ARGS="$ARGS --migrate-cold"
          fi
          python scripts/vacuum_orca_db.py $ARGS

      - name: Verify DB sizes
        run: |
          python - <<'PY'
          import os
          main = 'data/orca_state.db'
          cold = 'data/archive/lesson_archive_cold.db'
          main_mb = os.path.getsize(main) / 1024 / 1024
          cold_mb = os.path.getsize(cold) / 1024 / 1024 if os.path.exists(cold) else 0
          print(f'main_mb={main_mb:.2f}')
          print(f'cold_mb={cold_mb:.2f}')
          if main_mb >= 50:
              raise SystemExit(f'main DB still above 50MB warning threshold: {main_mb:.2f}MB')
          PY

      - name: Checkpoint DB
        run: |
          python - <<'PY'
          import os
          import sqlite3

          for db in ("data/orca_state.db", "data/archive/lesson_archive_cold.db"):
              if not os.path.exists(db):
                  continue
              conn = sqlite3.connect(db)
              conn.execute("PRAGMA wal_checkpoint(TRUNCATE);")
              conn.close()
              for suffix in ("-wal", "-shm"):
                  path = f"{db}{suffix}"
                  if os.path.exists(path):
                      os.remove(path)
                      print(f"Removed: {path}")
          print("Checkpoint complete")
          PY

      - name: Commit DB maintenance result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          echo "Git status before staging:"
          git status --short
          git add -f data/orca_state.db 2>/dev/null || true
          git add -f data/archive/lesson_archive_cold.db 2>/dev/null || true
          echo "Staged state diff:"
          git diff --cached --stat
          git diff --cached --name-status
          if git diff --cached --quiet; then
            echo "no state changes to commit"
          else
            git commit -m "chore: vacuum ORCA database"
            echo "Commit created: $(git rev-parse --short HEAD)"
            echo "Rebasing committed state on origin/main before push"
            git pull --rebase origin main || {
              git rebase --abort || true
              exit 1
            }
            if git push; then
              echo "Push succeeded"
            else
              echo "Initial push failed; rebasing once and retrying" >&2
              git pull --rebase origin main || {
                git rebase --abort || true
                exit 1
              }
              git push
              echo "Push succeeded after rebase retry"
            fi
          fi
          echo "Git status after push:"
          git status --short
